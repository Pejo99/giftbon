<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poklon Bon - Stockholm</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI', Arial, sans-serif;
    background:#0a4da2;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    background:#1565c0;
    color:white;
    width:800px;
    max-width:100%;
    padding:50px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.35);
    border:3px solid #90caf9;
}

h1{
    margin-top:0;
    font-size:3rem;
    letter-spacing:2px;
}

.subtitle{
    font-size:1.2rem;
    color:#e3f2fd;
}

.destination{
    font-size:3rem;
    font-weight:bold;
    margin:30px 0 15px;
}

.amount{
    font-size:5rem;
    font-weight:bold;
    margin:20px 0;
}

.badge{
    display:inline-block;
    background:white;
    color:#1565c0;
    padding:12px 25px;
    border-radius:50px;
    font-weight:bold;
    margin:20px 0;
}

.info{
    font-size:1.2rem;
    line-height:1.6;
    color:#e3f2fd;
    margin-top:20px;
}

.footer{
    margin-top:35px;
    font-style:italic;
    color:#bbdefb;
}

.qr{
    margin-top:35px;
}

.qr img{
    background:white;
    padding:10px;
    border-radius:15px;
}

.qr-text{
    margin-top:10px;
    font-size:0.9rem;
    color:#bbdefb;
}
</style>
</head>

<body>

<div class="card">

    <h1>🎁 POKLON BON 🎁</h1>

    <div class="subtitle">Za nezaboravno putovanje</div>

    <div class="destination">🇸🇪 STOCKHOLM</div>

    <p>Vrijednost poklona</p>

    <div class="amount">500 €</div>

    <div class="badge">✈️ Avionske karte su već kupljene</div>


</div>

</body>
</html>
